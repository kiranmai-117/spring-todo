apiVersion: apps/v1
kind: Deployment

metadata:
  name: todo-deployment

spec:
  replicas: 2

  selector:
    matchLabels:
      app: todo

  template:
    metadata:
      labels:
        app: todo

    spec:
      containers:
        - name: todo-container

          image: todo-app:latest
          imagePullPolicy: Never

          ports:
            - containerPort: 8080